services:
  db:
    image: postgres:14.10
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 1s
      timeout: 5s
      retries: 10
    volumes:
      - ~/data/agency/postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432

  backend:
    image: denntenna/agency:latest
    restart: always
    environment:
      - PHX_SERVER=${PHX_SERVER}
      - DATABASE_URL=${DATABASE_URL}
      - PHX_HOST=${PHX_HOST}
      - PHX_PORT=${PHX_PORT}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    ports:
      - 4000:4000
